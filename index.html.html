<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>父亲节快乐 - 致亲爱的父亲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    background: #1a0000;
    font-family: 'Noto Serif SC', serif;
    cursor: default;
    -webkit-tap-highlight-color: transparent;
    -webkit-text-size-adjust: 100%;
  }

  /* ====== 温暖背景渐变 ====== */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse at 30% 20%, rgba(200,30,30,0.25) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(255,180,50,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(120,10,10,0.3) 0%, transparent 70%),
      linear-gradient(180deg, #2a0505 0%, #1a0000 40%, #0d0000 100%);
  }

  /* ====== 灯笼 ====== */
  .lantern {
    position: fixed;
    z-index: 2;
    animation: lantern-swing 4s ease-in-out infinite;
    transform-origin: top center;
  }
  .lantern-body {
    width: 52px; height: 68px;
    background: radial-gradient(ellipse at 50% 40%, #ff3c3c, #cc1111, #990000);
    border-radius: 50% / 55%;
    position: relative;
    box-shadow: 0 0 30px rgba(255,60,60,0.5), 0 0 60px rgba(255,60,60,0.2);
  }
  .lantern-body::before {
    content: '福';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 26px;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255,215,0,0.6);
  }
  .lantern-cap {
    width: 36px; height: 10px;
    background: linear-gradient(180deg, #ffd700, #daa520);
    border-radius: 3px 3px 0 0;
    margin: 0 auto;
  }
  .lantern-bottom {
    width: 28px; height: 8px;
    background: linear-gradient(180deg, #daa520, #ffd700);
    border-radius: 0 0 3px 3px;
    margin: 0 auto;
  }
  .lantern-line {
    width: 2px; height: 40px;
    background: linear-gradient(180deg, transparent, #ffd700);
    margin: 0 auto;
  }
  .lantern-tassel {
    width: 3px; height: 30px;
    background: linear-gradient(180deg, #ff3c3c, #cc1111);
    margin: 0 auto;
    border-radius: 0 0 2px 2px;
    animation: tassel-sway 3s ease-in-out infinite;
  }
  .lantern:nth-child(1) { top: 20px; left: 40px; animation-delay: 0s; }
  .lantern:nth-child(2) { top: 15px; right: 40px; left: auto; animation-delay: 1s; }
  @keyframes lantern-swing {
    0%, 100% { transform: rotate(-4deg); }
    50%      { transform: rotate(4deg); }
  }
  @keyframes tassel-sway {
    0%, 100% { transform: rotate(-3deg); }
    50%      { transform: rotate(3deg); }
  }

  /* ====== 飘落花瓣 ====== */
  .petal {
    position: fixed;
    z-index: 1;
    width: 12px; height: 16px;
    border-radius: 50% 0 50% 50%;
    opacity: 0;
    animation: petal-fall var(--dur) linear infinite;
    animation-delay: var(--delay);
    filter: blur(0.5px);
  }
  @keyframes petal-fall {
    0%   { opacity: 0; transform: translateY(-5vh) translateX(0) rotate(0deg) scale(0.6); }
    10%  { opacity: 0.7; }
    50%  { transform: translateY(50vh) translateX(var(--sway)) rotate(180deg) scale(1); }
    90%  { opacity: 0.5; }
    100% { opacity: 0; transform: translateY(105vh) translateX(calc(var(--sway) * -1)) rotate(360deg) scale(0.4); }
  }

  /* ====== 光斑粒子 ====== */
  .spark {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 1;
    animation: spark-float var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes spark-float {
    0%   { opacity: 0; transform: translateY(0) scale(0.3); }
    25%  { opacity: 0.9; }
    50%  { opacity: 0.6; transform: translateY(calc(var(--drift) * -1)) scale(1); }
    75%  { opacity: 0.8; }
    100% { opacity: 0; transform: translateY(calc(var(--drift) * -2)) scale(0.3); }
  }

  /* ====== 漂浮元宝 ====== */
  .ingot {
    position: fixed;
    z-index: 1;
    font-size: 22px;
    opacity: 0;
    animation: ingot-float var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
  }
  @keyframes ingot-float {
    0%   { opacity: 0; transform: translateY(100vh) rotate(0deg) scale(0.5); }
    15%  { opacity: 0.6; }
    50%  { transform: translateY(50vh) rotate(15deg) scale(1); }
    85%  { opacity: 0.4; }
    100% { opacity: 0; transform: translateY(-10vh) rotate(-10deg) scale(0.6); }
  }

  /* ====== 主容器 ====== */
  .container {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    min-height: 100dvh;
    padding: 20px;
  }

  /* ====== 光环 ====== */
  .glow-ring {
    position: absolute;
    border-radius: 50%;
    border: 2px solid rgba(255, 60, 60, 0.12);
    animation: pulse-ring 4s ease-in-out infinite;
    box-shadow: 0 0 40px rgba(255, 60, 60, 0.06), inset 0 0 40px rgba(255, 180, 50, 0.04);
  }
  .glow-ring:nth-child(1) { width: 380px; height: 380px; animation-delay: 0s; }
  .glow-ring:nth-child(2) { width: 460px; height: 460px; animation-delay: 1.3s; }
  .glow-ring:nth-child(3) { width: 540px; height: 540px; animation-delay: 2.6s; }
  @keyframes pulse-ring {
    0%, 100% { transform: scale(1);   opacity: 0.3; }
    50%      { transform: scale(1.1); opacity: 0.7; }
  }

  /* ====== 剪纸太阳纹 ====== */
  .sun-wheel {
    position: absolute;
    width: 320px; height: 320px;
    animation: sun-spin 40s linear infinite;
    opacity: 0.08;
  }
  .sun-wheel svg { width: 100%; height: 100%; }
  @keyframes sun-spin { to { transform: rotate(360deg); } }

  /* ====== 领带 ====== */
  .tie-icon {
    position: relative;
    width: 110px;
    margin-bottom: 20px;
    animation: tie-appear 1.5s ease-out 0.8s both;
    filter: drop-shadow(0 0 20px rgba(255, 60, 60, 0.5));
  }
  @keyframes tie-appear {
    0%   { opacity: 0; transform: translateY(-60px) scale(0.3) rotate(-20deg); }
    60%  { transform: translateY(10px) scale(1.05) rotate(3deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  }

  /* ====== 祝福文字主标题 ====== */
  .title-wrap {
    text-align: center;
    margin-bottom: 16px;
  }
  .title-char {
    display: inline-block;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(52px, 9vw, 92px);
    background: linear-gradient(135deg, #ffd700, #ffaa00, #ffd700, #fff0b3, #ffd700);
    background-size: 300% 300%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: char-in 1s ease-out both, shimmer 5s ease-in-out infinite;
    filter: drop-shadow(0 3px 10px rgba(255, 180, 0, 0.5));
    letter-spacing: 0.1em;
    text-shadow: none;
  }
  @keyframes char-in {
    0%   { opacity: 0; transform: translateY(60px) scale(0.2) rotate(20deg); filter: blur(10px); }
    60%  { transform: translateY(-10px) scale(1.1) rotate(-3deg); }
    100% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); filter: blur(0); }
  }
  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* ====== 副标题 ====== */
  .subtitle {
    font-size: clamp(18px, 3vw, 26px);
    color: rgba(255, 200, 80, 0.85);
    letter-spacing: 0.35em;
    margin-bottom: 28px;
    animation: fade-up 1.2s ease-out 3s both;
    text-shadow: 0 0 12px rgba(255, 180, 0, 0.3);
  }

  /* ====== 装饰线 ====== */
  .deco-line {
    width: 140px; height: 2px;
    background: linear-gradient(to right, transparent, #ffd700, #ff6b35, #ffd700, transparent);
    margin: 18px auto;
    animation: line-grow 1.2s ease-out 2.8s both;
  }
  @keyframes line-grow {
    0%   { width: 0; opacity: 0; }
    100% { width: 140px; opacity: 1; }
  }

  /* ====== 问候卡 ====== */
  .card {
    background: linear-gradient(145deg, rgba(180,20,20,0.18), rgba(100,10,10,0.12));
    border: 1.5px solid rgba(255, 180, 50, 0.25);
    border-radius: 24px;
    padding: 40px 52px;
    max-width: 580px;
    text-align: center;
    backdrop-filter: blur(16px);
    animation: card-in 1.2s ease-out 3.5s both;
    box-shadow: 0 24px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,200,100,0.1);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: conic-gradient(from 0deg, transparent, rgba(255,180,50,0.08), transparent 25%);
    animation: card-glow-rotate 8s linear infinite;
  }
  .card::after {
    content: '';
    position: absolute;
    inset: 6px;
    border: 1px solid rgba(255,180,50,0.1);
    border-radius: 20px;
    pointer-events: none;
  }
  @keyframes card-glow-rotate { to { transform: rotate(360deg); } }
  @keyframes card-in {
    0%   { opacity: 0; transform: translateY(50px) scale(0.88); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .card .dad-name {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: clamp(30px, 5vw, 46px);
    color: #ffd700;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    text-shadow: 0 0 24px rgba(255,215,0,0.35);
    animation: name-glow 3s ease-in-out infinite alternate;
  }
  @keyframes name-glow {
    0%   { text-shadow: 0 0 16px rgba(255,215,0,0.25); }
    100% { text-shadow: 0 0 32px rgba(255,215,0,0.5); }
  }

  .card .dad-realname {
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(13px, 2.5vw, 17px);
    color: rgba(255, 200, 100, 0.55);
    letter-spacing: 0.6em;
    margin-top: -12px;
    margin-bottom: 20px;
    position: relative;
    z-index: 1;
    font-weight: 400;
  }

  .card .message {
    font-size: clamp(15px, 2.2vw, 19px);
    color: rgba(255, 230, 170, 0.85);
    line-height: 2.1;
    position: relative;
    z-index: 1;
  }

  /* ====== 逐行淡入 ====== */
  .msg-line {
    display: block;
    opacity: 0;
    animation: line-fade-in 0.8s ease-out both;
  }
  @keyframes line-fade-in {
    0%   { opacity: 0; transform: translateY(16px); }
    100% { opacity: 1; transform: translateY(0); }
  }

  /* ====== 爱心漂浮 ====== */
  .heart {
    position: fixed;
    font-size: 22px;
    z-index: 5;
    animation: heart-float var(--dur) ease-in-out infinite;
    animation-delay: var(--delay);
    opacity: 0;
    filter: drop-shadow(0 0 8px rgba(255, 80, 80, 0.4));
  }
  @keyframes heart-float {
    0%   { opacity: 0; transform: translateY(0) scale(0.4) rotate(0deg); }
    15%  { opacity: 0.85; }
    50%  { transform: translateY(-220px) scale(1) rotate(12deg); }
    100% { opacity: 0; transform: translateY(-440px) scale(0.5) rotate(-8deg); }
  }

  /* ====== 底部祝福 ====== */
  .footer {
    margin-top: 44px;
    font-size: 15px;
    color: rgba(255, 200, 100, 0.45);
    letter-spacing: 0.25em;
    animation: fade-up 1s ease-out 5s both;
    text-shadow: 0 0 8px rgba(255,180,0,0.15);
  }

  /* ====== 点击烟花 ====== */
  .fw {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    z-index: 999;
    animation: fw-boom 1s ease-out forwards;
  }
  @keyframes fw-boom {
    0%   { opacity: 1; transform: translate(0,0) scale(1); }
    80%  { opacity: 0.6; }
    100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
  }

  /* ====== 鼠标光晕 ====== */
  .cursor-glow {
    position: fixed;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,150,50,0.07) 0%, transparent 70%);
    pointer-events: none;
    z-index: 3;
    transform: translate(-50%,-50%);
    transition: left 0.4s ease-out, top 0.4s ease-out;
  }

  /* ====== 横幅装饰 ====== */
  .ribbon {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 36px;
    background: linear-gradient(135deg, #cc1111, #ff3c3c, #cc1111);
    border-radius: 0 0 12px 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 16px;
    color: #ffd700;
    letter-spacing: 0.5em;
    box-shadow: 0 4px 20px rgba(200,20,20,0.4);
    animation: ribbon-drop 1s ease-out 0.3s both;
    z-index: 20;
    text-shadow: 0 0 8px rgba(255,215,0,0.4);
  }
  .ribbon::before, .ribbon::after {
    content: '';
    position: absolute;
    bottom: -10px;
    width: 0; height: 0;
    border-style: solid;
  }
  .ribbon::before {
    left: 0;
    border-width: 10px 0 0 14px;
    border-color: #8b0000 transparent transparent #8b0000;
  }
  .ribbon::after {
    right: 0;
    border-width: 10px 14px 0 0;
    border-color: #8b0000 #8b0000 transparent transparent;
  }
  @keyframes ribbon-drop {
    0%   { opacity: 0; transform: translateX(-50%) translateY(-40px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ====== 鞭炮串 ====== */
  .firecrackers {
    position: fixed;
    top: 70px;
    z-index: 3;
    animation: fc-sway 5s ease-in-out infinite;
  }
  .firecrackers.left  { left: 20px; }
  .firecrackers.right { right: 20px; left: auto; }
  .fc-item {
    width: 14px; height: 22px;
    background: linear-gradient(180deg, #ff3c3c, #cc1111, #990000);
    border-radius: 4px 4px 50% 50%;
    margin: 6px auto;
    position: relative;
    box-shadow: 0 0 6px rgba(255,60,60,0.3);
  }
  .fc-item::after {
    content: '';
    position: absolute;
    top: 3px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 2px;
    background: #ffd700;
    border-radius: 1px;
  }
  .fc-line {
    width: 2px;
    background: #ffd700;
    margin: 0 auto;
    height: 100%;
    position: absolute;
    left: 50%; top: 0;
    transform: translateX(-50%);
    z-index: -1;
  }
  @keyframes fc-sway {
    0%, 100% { transform: rotate(-2deg); }
    50%      { transform: rotate(2deg); }
  }

  /* ====== 响应式 - 手机适配 ====== */
  @media (max-width: 768px) {
    .container {
      padding: 16px 12px;
      justify-content: flex-start;
      padding-top: 80px;
    }

    .glow-ring:nth-child(1) { width: 260px; height: 260px; }
    .glow-ring:nth-child(2) { width: 320px; height: 320px; }
    .glow-ring:nth-child(3) { width: 380px; height: 380px; }

    .sun-wheel { width: 220px; height: 220px; }

    .lantern {
      transform: scale(0.65);
      transform-origin: top center;
    }
    .lantern:nth-child(1) { top: 8px; left: 10px; }
    .lantern:nth-child(2) { top: 8px; right: 10px; }

    .firecrackers {
      transform: scale(0.6);
      transform-origin: top center;
    }
    .firecrackers.left  { left: -2px; top: 50px; }
    .firecrackers.right { right: -2px; top: 50px; }

    .ribbon {
      width: 200px;
      height: 30px;
      font-size: 13px;
      letter-spacing: 0.3em;
    }

    .tie-icon {
      width: 80px;
      margin-bottom: 14px;
      margin-top: 40px;
    }

    .title-wrap { margin-bottom: 10px; }

    .subtitle {
      font-size: clamp(14px, 4vw, 20px);
      letter-spacing: 0.2em;
      margin-bottom: 20px;
    }

    .deco-line {
      width: 100px;
      margin: 14px auto;
    }

    .card {
      padding: 28px 20px;
      max-width: 92vw;
      border-radius: 18px;
    }

    .card .dad-name {
      font-size: clamp(26px, 7vw, 38px);
      margin-bottom: 14px;
    }

    .card .message {
      font-size: clamp(14px, 3.8vw, 17px);
      line-height: 2;
    }

    .footer {
      margin-top: 32px;
      font-size: 13px;
      padding-bottom: 30px;
    }

    .heart { font-size: 16px; }

    .ingot { font-size: 16px; }

    .cursor-glow { display: none; }
  }

  /* 超小屏幕 */
  @media (max-width: 380px) {
    .container { padding-top: 65px; }

    .ribbon {
      width: 170px;
      height: 26px;
      font-size: 11px;
    }

    .tie-icon { width: 65px; margin-top: 30px; }

    .lantern { transform: scale(0.5); }

    .firecrackers { display: none; }

    .card { padding: 22px 16px; }

    .glow-ring { display: none; }
  }
</style>
</head>
<body>

<div class="bg"></div>

<!-- 灯笼 -->
<div class="lantern">
  <div class="lantern-line"></div>
  <div class="lantern-cap"></div>
  <div class="lantern-body"></div>
  <div class="lantern-bottom"></div>
  <div class="lantern-tassel"></div>
</div>
<div class="lantern">
  <div class="lantern-line"></div>
  <div class="lantern-cap"></div>
  <div class="lantern-body"></div>
  <div class="lantern-bottom"></div>
  <div class="lantern-tassel"></div>
</div>

<!-- 鞭炮 -->
<div class="firecrackers left" id="fc-left"></div>
<div class="firecrackers right" id="fc-right"></div>

<!-- 主内容 -->
<div class="container">
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>
  <div class="glow-ring"></div>

  <!-- 旋转太阳纹 -->
  <div class="sun-wheel">
    <svg viewBox="0 0 200 200"><g fill="none" stroke="#ffd700" stroke-width="0.8">
      <circle cx="100" cy="100" r="30"/>
      <circle cx="100" cy="100" r="50"/>
      <circle cx="100" cy="100" r="70"/>
      <circle cx="100" cy="100" r="90"/>
      <line x1="100" y1="5" x2="100" y2="195"/>
      <line x1="5" y1="100" x2="195" y2="100"/>
      <line x1="32" y1="32" x2="168" y2="168"/>
      <line x1="168" y1="32" x2="32" y2="168"/>
      <line x1="58" y1="12" x2="142" y2="188"/>
      <line x1="12" y1="58" x2="188" y2="142"/>
      <line x1="142" y1="12" x2="58" y2="188"/>
      <line x1="188" y1="58" x2="12" y2="142"/>
    </g></svg>
  </div>

  <div class="ribbon">父亲节快乐</div>

  <!-- 领带 -->
  <svg class="tie-icon" viewBox="0 0 100 140" fill="none" style="margin-top:50px;">
    <path d="M35 0 L65 0 L72 18 Q58 25 50 45 Q42 25 28 18 Z" fill="url(#tie-top)" stroke="rgba(255,215,100,0.3)" stroke-width="1"/>
    <path d="M28 18 L72 18 L62 70 L50 100 L38 70 Z" fill="url(#tie-mid)"/>
    <path d="M38 70 L50 100 L62 70 L56 130 L50 140 L44 130 Z" fill="url(#tie-bot)"/>
    <circle cx="50" cy="16" r="5" fill="rgba(255,215,100,0.6)"/>
    <defs>
      <linearGradient id="tie-top" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#cc1111"/><stop offset="100%" stop-color="#ee2222"/>
      </linearGradient>
      <linearGradient id="tie-mid" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#ee2222"/><stop offset="50%" stop-color="#cc1111"/><stop offset="100%" stop-color="#ee2222"/>
      </linearGradient>
      <linearGradient id="tie-bot" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#cc1111"/><stop offset="100%" stop-color="#990000"/>
      </linearGradient>
    </defs>
  </svg>

  <div class="title-wrap" id="title"></div>
  <div class="deco-line"></div>
  <div class="subtitle">✦ 致最伟大的父亲 ✦</div>

  <div class="card">
    <div class="dad-name">亲爱的父亲</div>
    <div class="dad-realname">— 戈光成 —</div>
    <div class="message" id="message"></div>
  </div>

  <div class="footer">— 您的孩子，永远爱您 ❤ —</div>
</div>

<!-- 漂浮爱心 -->
<div class="heart" style="left:8%;  bottom:0; --dur:6s;   --delay:0s;">❤️</div>
<div class="heart" style="left:20%; bottom:0; --dur:7.5s; --delay:1.5s;">💛</div>
<div class="heart" style="left:35%; bottom:0; --dur:6.8s; --delay:0.8s;">❤️</div>
<div class="heart" style="left:50%; bottom:0; --dur:8s;   --delay:3s;">🧡</div>
<div class="heart" style="left:65%; bottom:0; --dur:6.3s; --delay:2s;">💛</div>
<div class="heart" style="left:78%; bottom:0; --dur:7.2s; --delay:0.5s;">❤️</div>
<div class="heart" style="left:90%; bottom:0; --dur:6.6s; --delay:1.8s;">🧡</div>
<div class="heart" style="left:45%; bottom:0; --dur:7.8s; --delay:4s;">💛</div>
<div class="heart" style="left:15%; bottom:0; --dur:6.1s; --delay:2.5s;">❤️</div>
<div class="heart" style="left:82%; bottom:0; --dur:7s;   --delay:3.5s;">🧡</div>

<!-- 光标光晕 -->
<div class="cursor-glow" id="cursorGlow"></div>

<script>
// ====== 花瓣飘落 ======
(function() {
  const isMobile = window.innerWidth <= 768;
  const count = isMobile ? 12 : 25;
  const colors = ['#ff6b6b','#ee5555','#ff8888','#ffaaaa','#ff7777','#cc4444'];
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${colors[i%colors.length]};
      --dur:${8+Math.random()*10}s;
      --delay:${Math.random()*12}s;
      --sway:${(Math.random()-0.5)*120}px;
      width:${8+Math.random()*8}px;
      height:${10+Math.random()*10}px;
    `;
    document.body.appendChild(p);
  }
})();

// ====== 光斑粒子 ======
(function() {
  const isMobile = window.innerWidth <= 768;
  const count = isMobile ? 10 : 20;
  const colors = ['#ffd700','#ffaa00','#ff6b35','#ffb347','#ff6347'];
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'spark';
    const sz = 2 + Math.random()*3;
    s.style.cssText = `
      left:${Math.random()*100}%; top:${40+Math.random()*60}%;
      width:${sz}px; height:${sz}px;
      background:${colors[i%colors.length]};
      box-shadow: 0 0 ${sz*3}px ${colors[i%colors.length]};
      --dur:${5+Math.random()*8}s;
      --delay:${Math.random()*10}s;
      --drift:${100+Math.random()*200}px;
    `;
    document.body.appendChild(s);
  }
})();

// ====== 漂浮元宝 ======
(function() {
  const isMobile = window.innerWidth <= 768;
  const count = isMobile ? 5 : 10;
  const items = ['🧧','🪙','✨','🌟'];
  for (let i = 0; i < count; i++) {
    const g = document.createElement('div');
    g.className = 'ingot';
    g.textContent = items[i%items.length];
    g.style.cssText = `
      left:${5+Math.random()*90}%;
      --dur:${10+Math.random()*12}s;
      --delay:${Math.random()*15}s;
    `;
    document.body.appendChild(g);
  }
})();

// ====== 鞭炮 ======
(function() {
  const left = document.getElementById('fc-left');
  const right = document.getElementById('fc-right');
  for (let i = 0; i < 6; i++) {
    [left, right].forEach(el => {
      const fc = document.createElement('div');
      fc.className = 'fc-item';
      el.appendChild(fc);
    });
  }
})();

// ====== 标题逐字 ======
(function() {
  const text = '父亲节快乐';
  const wrap = document.getElementById('title');
  text.split('').forEach((ch, i) => {
    const s = document.createElement('span');
    s.className = 'title-char';
    s.textContent = ch;
    s.style.animationDelay = `${i*0.2+0.5}s, ${i*0.12+2.5}s`;
    wrap.appendChild(s);
  });
})();

// ====== 逐行文字淡入 ======
(function() {
  const lines = [
    '您用宽厚的肩膀撑起了一片天',
    '您用无声的爱温暖了整个家',
    '您是我人生路上最坚实的依靠',
    '',
    '感谢您无怨无悔的付出',
    '愿您健康长寿、笑口常开',
    '愿岁月温柔以待，福寿安康',
    '',
    '🎉 祝您父亲节快乐！🎉'
  ];
  const wrap = document.getElementById('message');
  lines.forEach((line, i) => {
    const span = document.createElement('span');
    span.className = 'msg-line';
    span.textContent = line || ' ';
    span.style.animationDelay = `${4 + i * 0.4}s`;
    if (i === lines.length - 1) {
      span.style.fontSize = '1.2em';
      span.style.color = '#ffd700';
    }
    wrap.appendChild(span);
  });
})();

// ====== 点击/触摸烟花 ======
function fireFireworks(cx, cy) {
  const colors = ['#ffd700','#ff3c3c','#ff8c00','#ff6b6b','#ffb347','#ffec8b','#ff4500','#daa520'];
  for (let burst = 0; burst < 3; burst++) {
    const delay = burst * 120;
    setTimeout(() => {
      const bx = cx + (Math.random()-0.5)*60;
      const by = cy + (Math.random()-0.5)*60;
      for (let i = 0; i < 28; i++) {
        const d = document.createElement('div');
        d.className = 'fw';
        const angle = (Math.PI*2/28)*i;
        const dist = 50 + Math.random()*100;
        const sz = 3 + Math.random()*5;
        d.style.cssText = `
          left:${bx}px; top:${by}px;
          width:${sz}px; height:${sz}px;
          background:${colors[Math.floor(Math.random()*colors.length)]};
          box-shadow: 0 0 ${sz*2}px ${colors[Math.floor(Math.random()*colors.length)]};
          --dx:${Math.cos(angle)*dist}px;
          --dy:${Math.sin(angle)*dist}px;
        `;
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 1100);
      }
    }, delay);
  }
}

document.addEventListener('click', (e) => { fireFireworks(e.clientX, e.clientY); });
document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  if (t) fireFireworks(t.clientX, t.clientY);
}, { passive: true });

// ====== 鼠标光晕 ======
(function() {
  const glow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', e => {
    glow.style.left = e.clientX + 'px';
    glow.style.top  = e.clientY + 'px';
  });
})();
</script>
</body>
</html>
